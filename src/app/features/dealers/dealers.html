<div class="container-honda py-8">
  <app-breadcrumb [items]="[{ label: 'Concesionarios Honda' }]" />

  <h1 class="dealers-title">Concesionarios Honda</h1>

  <div class="dealers-grid">
    @for (dealer of dealers(); track dealer.id) {
      <div class="dealer-card">
        <div class="dealer-card-body">
          @if (dealer.featured) {
            <span class="dealer-badge">Sede Principal</span>
          }
          <h4 class="dealer-name">{{ dealer.name }}</h4>
          <div class="dealer-info-row">
            <svg xmlns="http://www.w3.org/2000/svg" class="dealer-info-icon" viewBox="0 0 384 512" fill="currentColor">
              <path d="M172.268 501.67C26.97 291.031 0 269.413 0 192 0 85.961 85.961 0 192 0s192 85.961 192 192c0 77.413-26.97 99.031-172.268 309.67-9.535 13.774-29.93 13.773-39.464 0zM192 272c44.183 0 80-35.817 80-80s-35.817-80-80-80-80 35.817-80 80 35.817 80 80 80z"/>
            </svg>
            <span>{{ dealer.address }}, {{ dealer.city }}</span>
          </div>
          <div class="dealer-info-row">
            <svg xmlns="http://www.w3.org/2000/svg" class="dealer-info-icon" viewBox="0 0 512 512" fill="currentColor">
              <path d="M497.39 361.8l-112-48a24 24 0 0 0-28 6.9l-49.6 60.6A370.66 370.66 0 0 1 130.6 204.11l60.6-49.6a23.94 23.94 0 0 0 6.9-28l-48-112A24.16 24.16 0 0 0 122.6.61l-104 24A24 24 0 0 0 0 48c0 256.5 207.9 464 464 464a24 24 0 0 0 23.4-18.6l24-104a24.29 24.29 0 0 0-14.01-27.6z"/>
            </svg>
            <span>{{ dealer.phone }}</span>
          </div>
          <div class="dealer-actions">
            <a [href]="'tel:+57' + dealer.phone" class="dealer-call-btn">
              Llamar ahora
            </a>
            <a
              [href]="'https://api.whatsapp.com/send?phone=' + dealer.whatsapp"
              target="_blank"
              rel="noopener noreferrer"
              class="dealer-whatsapp-btn"
            >
              <img src="/images/whatsapp-logo.svg" alt="WhatsApp" class="dealer-wa-icon" />
              WhatsApp
            </a>
          </div>
        </div>
      </div>
    }
  </div>
</div>
