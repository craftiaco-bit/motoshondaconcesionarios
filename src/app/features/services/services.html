<!-- Hero banner -->
<section class="page-hero" style="background-image: url('/images/banner-servicios.png')">
  <div class="page-hero-overlay"></div>
  <div class="container-honda page-hero-inner">
    <div class="page-hero-text">
      <p class="page-hero-subtitle">Nuestros servicios</p>
      <h1 class="page-hero-title">Servicios</h1>
    </div>
    <div class="page-hero-breadcrumb">
      <a routerLink="/" class="page-hero-link">Inicio</a>
      <span class="page-hero-sep">›</span>
      <span class="page-hero-current">Servicios</span>
    </div>
  </div>
</section>

<!-- Service cards with descriptions -->
<div class="services-page-content">
  <div class="services-page-grid">
    <!-- Motos -->
    <div class="service-page-card-wrap">
      <div class="service-page-img-wrap">
        <img src="/images/Diseno-sin-titulo-2025-12-10T141833.274.png" alt="Motos Honda" class="service-page-img" />
      </div>
      <div class="service-page-card-body">
        <h3 class="service-page-name">Motos</h3>
        <p class="service-page-desc">Amplio inventario de motos Honda.</p>
        <a
          [href]="site.whatsappUrl()"
          target="_blank"
          rel="noopener noreferrer"
          class="service-page-btn"
        >
          Contactar
        </a>
      </div>
    </div>

    <!-- Financiación -->
    <div class="service-page-card-wrap">
      <div class="service-page-img-wrap">
        <img src="/images/Diseno-sin-titulo-2025-12-10T141918.012.png" alt="Financiación" class="service-page-img" />
      </div>
      <div class="service-page-card-body">
        <h3 class="service-page-name">Financiación</h3>
        <p class="service-page-desc">Facilitamos tu compra con planes flexibles.</p>
        <a
          [href]="site.whatsappUrl()"
          target="_blank"
          rel="noopener noreferrer"
          class="service-page-btn"
        >
          Contactar
        </a>
      </div>
    </div>

    <!-- Accesorios -->
    <div class="service-page-card-wrap">
      <div class="service-page-img-wrap">
        <img src="/images/Diseno-sin-titulo-2025-12-10T104134.970.png" alt="Accesorios" class="service-page-img" />
      </div>
      <div class="service-page-card-body">
        <h3 class="service-page-name">Accesorios</h3>
        <p class="service-page-desc">Accesorios y repuestos originales.</p>
        <a
          [href]="site.whatsappUrl()"
          target="_blank"
          rel="noopener noreferrer"
          class="service-page-btn"
        >
          Contactar
        </a>
      </div>
    </div>
  </div>
</div>
