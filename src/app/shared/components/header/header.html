<!-- ================================================================
     ROW 1: TOP BAR — black bg, phone + location, hidden on mobile
     ================================================================ -->
<div class="topbar">
  <div class="topbar-inner">
    <div></div>
    <div class="topbar-links">
      <a [href]="site.phoneUrl()" class="topbar-link">
        <svg xmlns="http://www.w3.org/2000/svg" class="topbar-icon" viewBox="0 0 512 512" fill="currentColor">
          <path d="M497.39 361.8l-112-48a24 24 0 0 0-28 6.9l-49.6 60.6A370.66 370.66 0 0 1 130.6 204.11l60.6-49.6a23.94 23.94 0 0 0 6.9-28l-48-112A24.16 24.16 0 0 0 122.6.61l-104 24A24 24 0 0 0 0 48c0 256.5 207.9 464 464 464a24 24 0 0 0 23.4-18.6l24-104a24.29 24.29 0 0 0-14.01-27.6z"/>
        </svg>
        <span>{{ site.config().phone }}</span>
      </a>
      <a routerLink="/concesionarios" class="topbar-link">
        <svg xmlns="http://www.w3.org/2000/svg" class="topbar-icon" viewBox="0 0 384 512" fill="currentColor">
          <path d="M172.268 501.67C26.97 291.031 0 269.413 0 192 0 85.961 85.961 0 192 0s192 85.961 192 192c0 77.413-26.97 99.031-172.268 309.67-9.535 13.774-29.93 13.773-39.464 0zM192 272c44.183 0 80-35.817 80-80s-35.817-80-80-80-80 35.817-80 80 35.817 80 80 80z"/>
        </svg>
        <span>Bogotá, Colombia</span>
      </a>
    </div>
  </div>
</div>

<!-- ================================================================
     ROW 2: LOGO BAR — white bg, full-width
     Logo | Search | Ubicación | CTA
     ================================================================ -->
<div class="logobar">
  <div class="logobar-inner">
    <!-- Left: Hamburger (mobile only) + Logo -->
    <div class="logobar-left">
      <button
        class="hamburger"
        (click)="nav.toggleMobileMenu()"
        [attr.aria-expanded]="nav.mobileMenuOpen()"
        aria-label="Menú de navegación"
      >
        @if (nav.mobileMenuOpen()) {
          <svg xmlns="http://www.w3.org/2000/svg" class="hamburger-icon" viewBox="0 0 1000 1000" fill="currentColor">
            <path d="M742 167L500 408 258 167C246 154 233 150 217 150 196 150 179 158 167 167 154 179 150 196 150 212 150 229 154 242 171 254L408 500 167 742C138 771 138 800 167 829 196 858 225 858 254 829L496 587 738 829C750 842 767 846 783 846 800 846 817 842 829 829 842 817 846 804 846 783 846 767 842 750 829 737L588 500 833 258C863 229 863 200 833 171 804 137 775 137 742 167Z"/>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" class="hamburger-icon" viewBox="0 0 1000 1000" fill="currentColor">
            <path d="M104 333H896C929 333 958 304 958 271S929 208 896 208H104C71 208 42 237 42 271S71 333 104 333ZM104 583H896C929 583 958 554 958 521S929 458 896 458H104C71 458 42 487 42 521S71 583 104 583ZM104 833H896C929 833 958 804 958 771S929 708 896 708H104C71 708 42 737 42 771S71 833 104 833Z"/>
          </svg>
        }
      </button>
      <a routerLink="/" class="logo-link" (click)="nav.closeMobileMenu()">
        <img src="/images/logo-honda.webp" alt="Honda Motos" class="logo-img">
      </a>
    </div>

    <!-- Center: Search box (hidden on tablet/mobile) -->
    <div class="logobar-search">
      <input
        type="search"
        class="search-input"
        placeholder="Busque su ciudad..."
        readonly
      >
    </div>

    <!-- Right: Ubicación + CTA (hidden on tablet/mobile) -->
    <div class="logobar-right">
      <a routerLink="/concesionarios" class="ubicacion-link">
        <svg xmlns="http://www.w3.org/2000/svg" class="ubicacion-icon" viewBox="0 0 384 512" fill="currentColor">
          <path d="M172.268 501.67C26.97 291.031 0 269.413 0 192 0 85.961 85.961 0 192 0s192 85.961 192 192c0 77.413-26.97 99.031-172.268 309.67-9.535 13.774-29.93 13.773-39.464 0zM192 272c44.183 0 80-35.817 80-80s-35.817-80-80-80-80 35.817-80 80 35.817 80 80 80z"/>
        </svg>
        <span>Ubicación</span>
      </a>
      <a
        [href]="site.whatsappUrl()"
        target="_blank"
        rel="noopener noreferrer"
        class="cta-btn"
      >
        Recibe Asesoría
      </a>
    </div>
  </div>
</div>

<!-- ================================================================
     ROW 3: NAV BAR — links left-aligned, hidden on phone
     ================================================================ -->
<nav class="navbar" [class.navbar--sticky]="true">
  <div class="navbar-inner">
    <ul class="navbar-links">
      @for (link of nav.links(); track link.routerLink) {
        <li>
          <a
            [routerLink]="link.routerLink"
            routerLinkActive="nav-active"
            [routerLinkActiveOptions]="{ exact: link.routerLink === '/' }"
            class="navbar-link"
          >
            {{ link.text }}
          </a>
        </li>
      }
    </ul>
  </div>
</nav>

<!-- ================================================================
     MOBILE: Search bar (visible only on mobile/tablet)
     ================================================================ -->
<div class="mobile-search">
  <input
    type="search"
    class="search-input"
    placeholder="Busque su ciudad..."
    readonly
  >
</div>

<!-- ================================================================
     MOBILE: Dropdown menu
     ================================================================ -->
@if (nav.mobileMenuOpen()) {
  <div class="mobile-menu">
    <ul class="mobile-menu-list">
      @for (link of nav.links(); track link.routerLink) {
        <li>
          <a
            [routerLink]="link.routerLink"
            routerLinkActive="nav-active"
            [routerLinkActiveOptions]="{ exact: link.routerLink === '/' }"
            class="mobile-nav-link"
            (click)="nav.closeMobileMenu()"
          >
            {{ link.text }}
          </a>
        </li>
      }
    </ul>
  </div>
}
