<!-- Main image with zoom on hover -->
<div
  class="gallery-main"
  #zoomContainer
  (mouseenter)="onMouseEnter()"
  (mousemove)="onMouseMove($event)"
  (mouseleave)="onMouseLeave()"
>
  <img
    [src]="currentImage()"
    [alt]="'Imagen del producto'"
    class="gallery-main-img"
    [class.gallery-main-img--zooming]="zooming()"
  />

  <!-- Zoom overlay: shows zoomed version following cursor -->
  @if (zooming()) {
    <div
      class="gallery-zoom-overlay"
      [style.background-image]="'url(' + currentImage() + ')'"
      [style.background-position]="zoomX() + '% ' + zoomY() + '%'"
    ></div>
  }

  <button class="gallery-zoom-icon" aria-label="Zoom disponible" type="button">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      <line x1="11" y1="8" x2="11" y2="14"/>
      <line x1="8" y1="11" x2="14" y2="11"/>
    </svg>
  </button>
</div>

<!-- Thumbnails -->
@if (images().length > 1) {
  <div class="gallery-thumbs">
    @for (thumb of displayThumbnails(); track $index) {
      <button
        (click)="selectImage($index)"
        class="gallery-thumb"
        [class.gallery-thumb--active]="selectedIndex() === $index"
        type="button"
        [attr.aria-label]="'Ver imagen ' + ($index + 1)"
      >
        <img [src]="thumb" alt="Miniatura" class="gallery-thumb-img" />
      </button>
    }
  </div>
}
