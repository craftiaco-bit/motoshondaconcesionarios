<a
  [href]="site.whatsappUrl()"
  target="_blank"
  rel="noopener noreferrer"
  class="wa-cta"
>
  <div class="wa-cta-icon">
    <img src="/images/whatsapp-logo.svg" alt="WhatsApp" />
  </div>
  <div class="wa-cta-text">
    <div class="wa-cta-info">
      <span class="wa-cta-name">Asesor comercial</span>
      <span class="wa-cta-status">Online</span>
    </div>
    <span class="wa-cta-label">Necesita ayuda? Contáctenos!</span>
  </div>
</a>
